<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex;gap:8px;padding:14px;box-sizing:border-box;height:150px}
.sw{flex:1;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;letter-spacing:.02em}
</style></head><body>
<div class="sw" style="background:var(--teal);color:rgba(255,255,255,.85)">--teal<br>#1f3d4d</div>
<div class="sw" style="background:var(--teal-soft);color:rgba(255,255,255,.85)">--teal-soft<br>#2c5364</div>
<div class="sw" style="background:var(--ink);color:rgba(255,255,255,.85)">--ink<br>#1a1a1a</div>
<div class="sw" style="background:var(--warm);color:rgba(255,255,255,.9)">--warm<br>#c2493d</div>
<div class="sw" style="background:var(--accent);color:rgba(255,255,255,.9)">--accent<br>#3e82b0</div>
<div class="sw" style="background:var(--amber);color:rgba(255,255,255,.9)">--amber<br>#b6862c</div>
</body></html>
