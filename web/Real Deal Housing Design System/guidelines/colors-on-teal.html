<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;height:150px;box-sizing:border-box;background:var(--teal);display:flex;align-items:center;gap:28px;padding:0 28px;font-family:var(--font-sans)}
</style></head><body>
<div>
<div style="font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:var(--on-teal-45)">What our clients say</div>
<div style="margin-top:8px;font-size:19px;font-weight:500;color:#fff;letter-spacing:-.01em">White 100 for emphasis text</div>
<div style="margin-top:4px;font-size:13px;color:var(--on-teal-55)">white/55 body · <span style="color:var(--on-teal-75)">white/75 links</span> · <span style="color:var(--on-teal-45)">white/45 labels</span></div>
</div>
<div style="margin-left:auto;display:flex;gap:8px;align-items:center">
<span style="border-radius:9999px;background:var(--warm);color:#fff;padding:3px 10px;font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">New</span>
<div style="width:120px;height:60px;border:1px solid var(--on-teal-border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--on-teal-45)">white/15 borders</div>
</div>
</body></html>
