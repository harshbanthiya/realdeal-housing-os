<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Shadowless — cards are 1px mist-deep borders; only ring is the active sidebar item" name="Card anatomy" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;height:170px;box-sizing:border-box;display:flex;align-items:center;gap:16px;padding:0 28px;background:#fff;font-family:var(--font-sans)}</style></head><body>
<div style="flex:1;border:1px solid var(--mist-deep);border-radius:16px;padding:18px">
<div style="aspect-ratio:4/3;max-height:56px;border:1px dashed var(--mist-deep);border-radius:8px;background:rgba(238,241,239,.5)"></div>
<div style="margin-top:10px;font-size:14px;font-weight:600;color:var(--teal)">1px border, no shadow</div>
<div style="margin-top:2px;font-size:11px;color:var(--ink-50)">hover → mist/40 wash</div>
</div>
<div style="flex:1;background:rgba(238,241,239,.3);border-radius:12px;padding:12px">
<div style="background:#fff;border-radius:8px;box-shadow:0 0 0 1px var(--mist-deep);padding:8px 12px;font-size:13px;font-weight:500;color:var(--teal)">Active: white + 1px ring</div>
<div style="padding:8px 12px;font-size:13px;color:var(--ink-65)">Idle: transparent</div>
</div>
</body></html>
