<!-- @dsCard group="Colors" viewport="700x150" subtitle="White-dominant surfaces, mist, and ink opacity steps" name="Neutrals & ink steps" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;display:flex;gap:8px;padding:14px;box-sizing:border-box;height:150px}
.sw{flex:1;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-mono);font-size:10px;color:var(--ink-55)}
.inks{flex:2;border:1px solid var(--mist-deep);border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;justify-content:center;gap:2px;font-family:var(--font-sans);font-size:12px;font-weight:600}
</style></head><body>
<div class="sw" style="background:#fff;border:1px solid var(--mist-deep)">--white<br>#ffffff</div>
<div class="sw" style="background:var(--mist)">--mist<br>#eef1ef</div>
<div class="sw" style="background:var(--mist-deep)">--mist-deep<br>#e3e8e5</div>
<div class="inks">
<span style="color:var(--ink)">ink — headings pair w/ teal</span>
<span style="color:var(--ink-65)">ink/65 — body</span>
<span style="color:var(--ink-50)">ink/50 — muted meta</span>
<span style="color:var(--ink-40)">ink/40 — faint labels</span>
</div>
</body></html>
