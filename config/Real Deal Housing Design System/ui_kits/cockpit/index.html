<!-- @startingPoint section="Cockpit" subtitle="Operations cockpit — sidebar, portfolio, contacts" viewport="1280x800" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDH Operations Cockpit — UI kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { margin: 0; background: #fff; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.RealDealHousingDesignSystem_83c048;
if (!NS || !NS.CockpitPortfolio) {
  document.getElementById("root").innerHTML = '<div style="padding:48px;font-family:monospace;font-size:13px;color:#1f3d4d">design-system bundle compiling — reloading…</div>';
  const n = +(sessionStorage.getItem("rdh_retry_cockpit") || 0);
  if (n < 3) { sessionStorage.setItem("rdh_retry_cockpit", n + 1); setTimeout(() => location.reload(), 1500); }
  throw new Error("bundle not ready");
}
sessionStorage.removeItem("rdh_retry_cockpit");
const { CockpitSidebar, CockpitTopbar, CockpitPortfolio, CockpitContacts } = NS;
const { useState } = React;

function ComingSoon({ label }) {
  return (
    <div style={{ padding: "28px 24px", fontFamily: "var(--font-sans)" }}>
      <h1 style={{ margin: 0, fontSize: 24, fontWeight: 600, letterSpacing: "-0.02em", color: "var(--teal)" }}>{label}</h1>
      <p style={{ margin: "4px 0 0", fontSize: 14, color: "var(--ink-55)" }}>Not recreated in this kit — see the codebase for the live view.</p>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("portfolio");
  return (
    <div data-screen-label={screen} style={{ display: "flex", height: "100vh", overflow: "hidden" }}>
      <CockpitSidebar screen={screen} go={setScreen} />
      <div style={{ display: "flex", flex: 1, flexDirection: "column", overflow: "hidden" }}>
        <CockpitTopbar />
        <main style={{ flex: 1, overflowY: "auto", background: "#fff" }}>
          {screen === "portfolio" && <CockpitPortfolio />}
          {screen === "contacts" && <CockpitContacts />}
          {screen === "audiences" && <ComingSoon label="Audiences" />}
          {screen === "outreach" && <ComingSoon label="Outreach" />}
          {screen === "media" && <ComingSoon label="Media" />}
        </main>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
